###############################################################################
# SERVER CONFIGURATION FILE — v3 (Fully Dynamic)
# ─────────────────────────────────────────────────────────────────────────────
# ALL scripts read from this file. Edit ONLY this file to customize.
# After editing, re-run: sudo bash setup_all.sh
#
# Server : ECC-Desktop (Ubuntu On-Premises)
# Updated: 2026-02-27
###############################################################################

# ─── GENERAL ─────────────────────────────────────────────────────────────────
SERVER_NAME="ECC-Desktop"
ADMIN_USER="ecc-admin"

# ─── INTERACTIVE MODE ────────────────────────────────────────────────────────
# If "yes", scripts show warnings and ask confirmation before each section.
# If "no", scripts run without prompts (use for automated/cron runs).
INTERACTIVE_MODE="yes"

# ─── SSH — Fully Dynamic ────────────────────────────────────────────────────
SSH_PORTS="22,2222"
SSH_PERMIT_ROOT="no"
SSH_PASSWORD_AUTH="no"
SSH_PUBKEY_AUTH="yes"
SSH_PERMIT_EMPTY_PASSWORDS="no"
SSH_X11_FORWARDING="no"
SSH_MAX_AUTH_TRIES=3
SSH_IDLE_TIMEOUT=300
SSH_IDLE_COUNT_MAX=2
SSH_LOGIN_GRACE_TIME=60
SSH_ALLOW_AGENT_FORWARDING="no"
SSH_ALLOW_TCP_FORWARDING="no"
SSH_PROTOCOL=2
SSH_LOG_LEVEL="VERBOSE"

# ─── FIREWALL — Allowed Ports ───────────────────────────────────────────────
# Format: PORT/PROTOCOL:ACCESS:COMMENT
# ACCESS = "any" (open to all) | "lan" (office network only)
FIREWALL_RULES=(
    "22/tcp:any:SSH"
    "2222/tcp:any:SSH-Alt"
    "80/tcp:any:HTTP"
    "443/tcp:any:HTTPS"
    "3000/tcp:any:Grafana"
    "3100/tcp:any:Loki"
    "4954/tcp:any:Trivy"
    "8000/tcp:any:Docker-VAPT-8000"
    "9000/tcp:any:Docker-VAPT-9000"
    "9090/tcp:any:Prometheus"
    "9093/tcp:any:AlertManager"
    "11434/tcp:any:Docker-Ollama"
    "12345/tcp:any:Alloy"
    "445/tcp:lan:Samba"
)

# ─── FIREWALL — Trusted Networks (for "lan" rules) ──────────────────────────
TRUSTED_NETWORKS=(
    "192.168.1.0/24"
    "192.168.20.0/24"
)

# ─── SERVICES TO DISABLE ────────────────────────────────────────────────────
SERVICES_TO_DISABLE=(
    "avahi-daemon"
    "cups"
    "bluetooth"
)

# ─── SERVICES TO PROTECT (Never Stop/Disable) ───────────────────────────────
PROTECTED_SERVICES=(
    "docker"
    "docker.socket"
    "containerd"
    "sshd"
    "ssh"
    "ufw"
    "grafana-server"
    "prometheus"
    "loki"
    "alloy"
    "smbd"
    "nmbd"
)

# ─── DOCKER SETTINGS ────────────────────────────────────────────────────────
DOCKER_CLEANUP_ENABLED="no"
KEEP_IP_FORWARDING="yes"

# ─── LOG MANAGEMENT ─────────────────────────────────────────────────────────
LOG_RETENTION_DAYS=30
LOG_MAX_DISK_GB=2
LOG_ALERT_THRESHOLD_MB=5000
CENTRALIZED_LOG_DIR="/var/log/centralized"

CUSTOM_LOG_PATHS=(
    "/var/log/grafana"
    "/var/log/loki"
    "/var/log/prometheus"
)

# ─── HOUSEKEEPING ────────────────────────────────────────────────────────────
TEMP_FILE_MAX_AGE_DAYS=7
CRASH_REPORT_MAX_AGE_DAYS=7

# ─── PASSWORD POLICY ─────────────────────────────────────────────────────────
PASS_MAX_DAYS=90
PASS_MIN_DAYS=7
PASS_WARN_AGE=14
PASS_MIN_LEN=12

# ─── KERNEL HARDENING ───────────────────────────────────────────────────────
ENABLE_SYN_COOKIES="yes"
DISABLE_ICMP_REDIRECTS="yes"
ENABLE_ASLR="yes"
LOG_MARTIAN_PACKETS="yes"

# ─── HARDENING SECTIONS TO RUN ──────────────────────────────────────────────
# Set any to "no" to skip that section entirely
RUN_SYSTEM_UPDATES="yes"
RUN_SSH_HARDENING="yes"
RUN_FIREWALL="yes"
RUN_FAIL2BAN="yes"
RUN_KERNEL_SECURITY="yes"
RUN_PASSWORD_POLICY="yes"
RUN_FILE_PERMISSIONS="yes"
RUN_DISABLE_SERVICES="yes"
RUN_AUDITD="yes"
RUN_LOGIN_BANNER="yes"
RUN_SHARED_MEMORY="yes"

# ─── LOG MANAGEMENT SECTIONS ────────────────────────────────────────────────
RUN_CENTRALIZED_DIR="yes"
RUN_JOURNALD="yes"
RUN_RSYSLOG="yes"
RUN_DOCKER_LOGS="yes"
RUN_SERVICE_SYMLINKS="yes"
RUN_LOGROTATE="yes"
RUN_LOGWATCH="yes"
RUN_LOG_CRON="yes"

# ─── HOUSEKEEPING SECTIONS ──────────────────────────────────────────────────
RUN_PACKAGE_CLEANUP="yes"
RUN_TEMP_CLEANUP="yes"
RUN_CACHE_CLEANUP="yes"
RUN_JOURNAL_VACUUM="yes"
RUN_KERNEL_CLEANUP="yes"
RUN_SNAP_CLEANUP="yes"
RUN_ZOMBIE_CHECK="yes"
RUN_STALE_CLEANUP="yes"
RUN_DISK_REPORT="yes"
